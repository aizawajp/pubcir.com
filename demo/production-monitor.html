<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生産ライン監視ダッシュボード | PUBCIR Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a1628;
  color: #e2e8f0;
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  min-height: 100vh;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  background: rgba(15, 23, 42, 0.95);
  border-bottom: 1px solid rgba(30, 58, 138, 0.6);
  flex-wrap: wrap;
  gap: 10px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1.15rem;
  font-weight: 700;
  white-space: nowrap;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 24px;
  font-size: 0.85rem;
  color: #94a3b8;
}

.status-connected {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #22c55e;
  font-weight: 600;
}

.status-connected .dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: #22c55e;
  border-radius: 50%;
  box-shadow: 0 0 6px #22c55e;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.logo-text {
  font-weight: 700;
  font-size: 1rem;
  color: #007CBA;
  letter-spacing: 2px;
}

/* Main content */
.main {
  padding: 28px;
  max-width: 1400px;
  margin: 0 auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

/* Card */
.card {
  background: rgba(30, 58, 138, 0.4);
  border: 1px solid rgba(59, 130, 246, 0.3);
  border-radius: 12px;
  padding: 22px;
  transition: border-color 0.3s;
}

.card:hover {
  border-color: rgba(59, 130, 246, 0.6);
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.card-title {
  font-size: 1rem;
  font-weight: 600;
}

.badge {
  padding: 3px 12px;
  border-radius: 9999px;
  font-size: 0.75rem;
  font-weight: 600;
}

.badge-green {
  background: rgba(34, 197, 94, 0.2);
  color: #22c55e;
  border: 1px solid rgba(34, 197, 94, 0.4);
}

.badge-red {
  background: rgba(239, 68, 68, 0.2);
  color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.4);
}

.metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 16px;
}

.metric {
  background: rgba(15, 23, 42, 0.5);
  border-radius: 8px;
  padding: 12px;
}

.metric-label {
  font-size: 0.7rem;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.metric-value {
  font-size: 1.25rem;
  font-weight: 700;
  color: #f1f5f9;
}

.metric-value .unit {
  font-size: 0.75rem;
  font-weight: 400;
  color: #94a3b8;
  margin-left: 2px;
}

.metric-value .ng-pct {
  font-size: 0.75rem;
  font-weight: 500;
  color: #ef4444;
  margin-left: 4px;
}

.metric-value .ng-pct.low {
  color: #22c55e;
}

/* Progress bar */
.progress-wrap {
  margin-top: 6px;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: rgba(15, 23, 42, 0.8);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #007CBA, #22d3ee);
  border-radius: 3px;
  transition: width 0.6s ease;
}

.progress-text {
  font-size: 0.65rem;
  color: #64748b;
  margin-top: 3px;
  text-align: right;
}

/* Product */
.product-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding: 8px 12px;
  background: rgba(15, 23, 42, 0.5);
  border-radius: 8px;
}

.product-label {
  font-size: 0.7rem;
  color: #64748b;
}

.product-name {
  font-size: 0.85rem;
  font-weight: 600;
  color: #e2e8f0;
}

/* Chart */
.chart-section {
  margin-top: 4px;
}

.chart-label {
  font-size: 0.7rem;
  color: #64748b;
  margin-bottom: 6px;
}

.chart-canvas {
  width: 100%;
  height: 100px;
  display: block;
  border-radius: 6px;
  background: rgba(15, 23, 42, 0.5);
}

/* Back link */
.back-link-wrap {
  text-align: center;
  margin-top: 40px;
  padding-bottom: 40px;
}

.back-link {
  color: #007CBA;
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  transition: color 0.2s;
}

.back-link:hover {
  color: #22d3ee;
}

/* Responsive */
@media (max-width: 1024px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 640px) {
  .grid { grid-template-columns: 1fr; }
  .header { padding: 12px 16px; }
  .header-left { font-size: 0.95rem; }
  .main { padding: 16px; }
  .metrics { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">🏭 生産ライン監視ダッシュボード</div>
  <div class="header-right">
    <div class="status-connected"><span class="dot"></span> 接続中</div>
    <div id="datetime"></div>
    <div class="logo-text">PUBCIR</div>
  </div>
</header>

<main class="main">
  <div class="grid" id="line-grid"></div>
  <div class="back-link-wrap">
    <a href="../demo.html" class="back-link">← デモ一覧に戻る</a>
    <p style="text-align:center;font-size:0.72rem;color:#64748B;margin-top:12px;font-family:'Noto Sans JP',sans-serif;">※ 本デモは実際の導入実績を基に内容を抽象化し、Web上で動作を体験いただけるよう作成したものです。表示データはサンプルです。</p>
  </div>
</main>

<script>
(function() {
  // --- Data ---
  var lines = [
    {
      name: 'Assembly Line #1',
      status: '稼働中',
      statusType: 'green',
      baseCycleTime: 10.2,
      cycleTime: 10.2,
      produced: 523,
      target: 800,
      ng: 12,
      product: 'Motor Unit A100',
      chartSeed: 1
    },
    {
      name: 'Assembly Line #2',
      status: '稼働中',
      statusType: 'green',
      baseCycleTime: 9.8,
      cycleTime: 9.8,
      produced: 612,
      target: 800,
      ng: 8,
      product: 'Gear Box B200',
      chartSeed: 2
    },
    {
      name: 'Inspection Line #1',
      status: '警戒',
      statusType: 'red',
      baseCycleTime: 11.5,
      cycleTime: 11.5,
      produced: 389,
      target: 600,
      ng: 27,
      product: 'Sensor Module C50',
      chartSeed: 3
    },
    {
      name: 'Packing Line #1',
      status: '稼働中',
      statusType: 'green',
      baseCycleTime: 8.4,
      cycleTime: 8.4,
      produced: 710,
      target: 900,
      ng: 5,
      product: 'Package Unit D10',
      chartSeed: 4
    }
  ];

  // Seeded pseudo-random
  function seededRandom(seed) {
    var s = seed;
    return function() {
      s = (s * 16807 + 0) % 2147483647;
      return (s - 1) / 2147483646;
    };
  }

  function generateChartData(seed, points) {
    var rng = seededRandom(seed * 12345 + 67);
    var data = [];
    var val = 9.5 + rng() * 1.5;
    for (var i = 0; i < points; i++) {
      val += (rng() - 0.48) * 0.8;
      if (val < 8) val = 8 + rng() * 0.5;
      if (val > 12) val = 12 - rng() * 0.5;
      data.push(parseFloat(val.toFixed(1)));
    }
    return data;
  }

  // --- Chart data arrays (live, will be mutated) ---
  var chartDataArrays = [];
  lines.forEach(function(line) {
    chartDataArrays.push(generateChartData(line.chartSeed, 18));
  });

  // --- Build cards ---
  var grid = document.getElementById('line-grid');

  lines.forEach(function(line, idx) {
    var pct = (line.produced / line.target * 100).toFixed(0);
    var ngPct = (line.ng / line.produced * 100).toFixed(1);
    var ngPctClass = parseFloat(ngPct) < 2 ? 'low' : '';
    var badgeClass = line.statusType === 'green' ? 'badge-green' : 'badge-red';
    var canvasId = 'chart-' + idx;

    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-header">' +
        '<div class="card-title">' + line.name + '</div>' +
        '<span class="badge ' + badgeClass + '">' + line.status + '</span>' +
      '</div>' +
      '<div class="product-row">' +
        '<span class="product-label">製品</span>' +
        '<span class="product-name">' + line.product + '</span>' +
      '</div>' +
      '<div class="metrics">' +
        '<div class="metric">' +
          '<div class="metric-label">サイクルタイム</div>' +
          '<div class="metric-value" id="ct-' + idx + '">' + line.cycleTime.toFixed(1) + '<span class="unit">秒</span></div>' +
        '</div>' +
        '<div class="metric">' +
          '<div class="metric-label">NG数</div>' +
          '<div class="metric-value" id="ng-' + idx + '">' + line.ng + '<span class="ng-pct ' + ngPctClass + '"> (' + ngPct + '%)</span></div>' +
        '</div>' +
        '<div class="metric" style="grid-column:1/3">' +
          '<div class="metric-label">生産数</div>' +
          '<div class="metric-value" id="prod-' + idx + '">' + line.produced + '<span class="unit"> / ' + line.target + '</span></div>' +
          '<div class="progress-wrap">' +
            '<div class="progress-bar"><div class="progress-fill" id="pbar-' + idx + '" style="width:' + pct + '%"></div></div>' +
            '<div class="progress-text" id="ppct-' + idx + '">' + pct + '%</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="chart-section">' +
        '<div class="chart-label">サイクルタイム推移</div>' +
        '<canvas id="' + canvasId + '" class="chart-canvas"></canvas>' +
      '</div>';

    grid.appendChild(card);
  });

  // --- Draw charts ---
  function drawChart(canvasId, data, warn) {
    var canvas = document.getElementById(canvasId);
    if (!canvas) return;
    var rect = canvas.parentElement.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    var w = rect.width;
    var h = 100;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';

    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    var pad = { top: 12, right: 12, bottom: 18, left: 32 };
    var cw = w - pad.left - pad.right;
    var ch = h - pad.top - pad.bottom;
    var minY = 7.5;
    var maxY = 12.5;
    var rangeY = maxY - minY;

    // Grid lines
    ctx.strokeStyle = 'rgba(100,116,139,0.15)';
    ctx.lineWidth = 1;
    for (var g = 8; g <= 12; g += 1) {
      var gy = pad.top + ch - ((g - minY) / rangeY) * ch;
      ctx.beginPath();
      ctx.moveTo(pad.left, gy);
      ctx.lineTo(w - pad.right, gy);
      ctx.stroke();

      ctx.fillStyle = '#475569';
      ctx.font = '9px Inter, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(g.toString(), pad.left - 5, gy + 3);
    }

    // Line
    var lineColor = warn ? '#ef4444' : '#22d3ee';
    var fillColor = warn ? 'rgba(239,68,68,0.08)' : 'rgba(34,211,238,0.08)';

    ctx.beginPath();
    for (var i = 0; i < data.length; i++) {
      var x = pad.left + (i / (data.length - 1)) * cw;
      var y = pad.top + ch - ((data[i] - minY) / rangeY) * ch;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    // Fill under curve
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Area fill
    var lastX = pad.left + cw;
    var baseY = pad.top + ch;
    ctx.lineTo(lastX, baseY);
    ctx.lineTo(pad.left, baseY);
    ctx.closePath();
    ctx.fillStyle = fillColor;
    ctx.fill();

    // Data dots
    ctx.fillStyle = lineColor;
    for (var i = 0; i < data.length; i++) {
      var x = pad.left + (i / (data.length - 1)) * cw;
      var y = pad.top + ch - ((data[i] - minY) / rangeY) * ch;
      ctx.beginPath();
      ctx.arc(x, y, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function renderAllCharts() {
    lines.forEach(function(line, idx) {
      drawChart('chart-' + idx, chartDataArrays[idx], line.statusType === 'red');
    });
  }

  renderAllCharts();
  window.addEventListener('resize', renderAllCharts);

  // --- Periodic live update (every 2 seconds) ---
  function tickUpdate() {
    lines.forEach(function(line, idx) {
      // Cycle time: ±0.3 from base value
      line.cycleTime = parseFloat((line.baseCycleTime + (Math.random() - 0.5) * 0.6).toFixed(1));

      // Production count: +1 to +3
      line.produced = Math.min(line.produced + Math.floor(Math.random() * 3) + 1, line.target);

      // NG count: 10% chance to increase by 1
      if (Math.random() < 0.1) {
        line.ng += 1;
      }

      // Recalculate derived values
      var pct = (line.produced / line.target * 100).toFixed(0);
      var ngPct = (line.ng / line.produced * 100).toFixed(1);
      var ngPctClass = parseFloat(ngPct) < 2 ? 'low' : '';

      // Update DOM
      document.getElementById('ct-' + idx).innerHTML = line.cycleTime.toFixed(1) + '<span class="unit">秒</span>';
      document.getElementById('ng-' + idx).innerHTML = line.ng + '<span class="ng-pct ' + ngPctClass + '"> (' + ngPct + '%)</span>';
      document.getElementById('prod-' + idx).innerHTML = line.produced + '<span class="unit"> / ' + line.target + '</span>';
      document.getElementById('pbar-' + idx).style.width = pct + '%';
      document.getElementById('ppct-' + idx).textContent = pct + '%';

      // Append new chart data point (shift left, add new)
      var chartData = chartDataArrays[idx];
      var newVal = line.cycleTime + (Math.random() - 0.5) * 0.4;
      if (newVal < 8) newVal = 8 + Math.random() * 0.3;
      if (newVal > 12) newVal = 12 - Math.random() * 0.3;
      chartData.push(parseFloat(newVal.toFixed(1)));
      if (chartData.length > 18) chartData.shift();
    });

    renderAllCharts();
  }

  setInterval(tickUpdate, 2000);

  // --- Clock ---
  function updateClock() {
    var now = new Date();
    var y = now.getFullYear();
    var mo = String(now.getMonth() + 1).padStart(2, '0');
    var d = String(now.getDate()).padStart(2, '0');
    var h = String(now.getHours()).padStart(2, '0');
    var mi = String(now.getMinutes()).padStart(2, '0');
    var s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('datetime').textContent = y + '/' + mo + '/' + d + ' ' + h + ':' + mi + ':' + s;
  }
  updateClock();
  setInterval(updateClock, 1000);
})();
</script>
</body>
</html>
